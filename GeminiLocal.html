<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini Nano - Local Inference</title>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #adbac7;
            --blue: #539bf5;
            --green: #57ab5a;
            --red: #e5534b;
            --yellow: #c69026;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        header {
            padding: 13px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            flex-shrink: 0;
        }
        .logo { font-weight: bold; color: #fff; font-size: 15px; }
        .stat-box { font-family: monospace; font-size: 12px; color: var(--green); background: #1c2128; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); }

        /* ── Modal ── */
        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
        #modal-overlay.open { display: flex; }
        #modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; width: min(500px, 95vw); padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .flag-card { background: #0d1117; border: 1px solid var(--border); padding: 10px; border-radius: 8px; font-size: 12px; margin-top: 5px; }
        .copy-btn { background: var(--border); border: none; color: #fff; padding: 2px 8px; border-radius: 4px; cursor: pointer; float: right; }

        /* ── Chat ── */
        #chat-flow { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--blue); color: #fff; }
        .nano { align-self: flex-start; background: var(--card); border: 1px solid var(--border); white-space: pre-wrap; }
        .streaming::after { content: '▋'; animation: blink 0.8s infinite; color: var(--blue); }
        @keyframes blink { 50% { opacity: 0; } }

        /* ── Controls ── */
        .input-container { padding: 15px; border-top: 1px solid var(--border); background: var(--card); display: flex; gap: 10px; }
        input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 8px; outline: none; }
        .btn { border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #sendBtn { background: var(--blue); color: #fff; }
        #stopBtn { background: var(--red); color: #fff; display: none; }
        #setupBtn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">NANO_LOCAL_v1.2</div>
    <div style="display:flex; gap:10px; align-items:center;">
        <div id="stats" class="stat-box">Ready</div>
        <button id="setupBtn">⚙ Setup</button>
    </div>
</header>

<div id="chat-flow"></div>

<div class="input-container">
    <input type="text" id="promptInput" placeholder="Message local model..." autocomplete="off">
    <button class="btn" id="stopBtn">STOP</button>
    <button class="btn" id="sendBtn">SEND</button>
</div>

<div id="modal-overlay">
    <div id="modal">
        <div style="display:flex; justify-content:space-between;">
            <h3 style="color:#fff">Required Chrome Flags</h3>
            <button id="closeModal" style="background:none; border:none; color:#fff; cursor:pointer; font-size:20px;">&times;</button>
        </div>
        <p style="font-size: 13px;">Enable these in <code>chrome://flags</code> to use local AI:</p>
        
        <div class="flag-card">
            <strong>1. Prompt API</strong><br>
            <code>#prompt-api-for-gemini-nano</code>
            <button class="copy-btn" onclick="copy('chrome://flags/#prompt-api-for-gemini-nano')">Copy</button>
        </div>

        <div class="flag-card">
            <strong>2. Optimization Guide</strong><br>
            <code>#optimization-guide-on-device-model</code>
            <button class="copy-btn" onclick="copy('chrome://flags/#optimization-guide-on-device-model')">Copy</button>
        </div>

        <div class="flag-card">
            <strong>3. Text Safety</strong><br>
            <code>#text-safety-classifier</code>
            <button class="copy-btn" onclick="copy('chrome://flags/#text-safety-classifier')">Copy</button>
        </div>
        <p style="font-size: 11px; color: var(--yellow);">*Relaunch Chrome after enabling all three.</p>
    </div>
</div>

<script>
    const chatFlow = document.getElementById('chat-flow');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const stopBtn = document.getElementById('stopBtn');
    const overlay = document.getElementById('modal-overlay');
    const setupBtn = document.getElementById('setupBtn');

    let session = null;
    let abortController = null;

    // Modal Logic
    setupBtn.onclick = () => overlay.classList.add('open');
    document.getElementById('closeModal').onclick = () => overlay.classList.remove('open');
    function copy(t) { navigator.clipboard.writeText(t); alert('URL Copied! Paste it in your address bar.'); }

    function setUI(isStreaming) {
        sendBtn.style.display = isStreaming ? 'none' : 'block';
        stopBtn.style.display = isStreaming ? 'block' : 'none';
        promptInput.disabled = isStreaming;
        if (!isStreaming) promptInput.focus();
    }

    stopBtn.onclick = () => {
        if (abortController) abortController.abort();
    };

    async function chat() {
        const query = promptInput.value.trim();
        if (!query) return;

        setUI(true);
        abortController = new AbortController();

        addBubble(query, 'user');
        promptInput.value = '';
        const nanoBubble = addBubble('', 'nano streaming');

        try {
            const engine = window.ai?.languageModel || window.LanguageModel;
            if (!engine) throw new Error("API not enabled. Check Setup.");

            if (!session) session = await engine.create();

            const stream = session.promptStreaming(query, { signal: abortController.signal });

            let text = '';
            for await (const chunk of stream) {
                text += chunk;
                nanoBubble.textContent = text;
                chatFlow.scrollTop = chatFlow.scrollHeight;
            }
        } catch (err) {
            if (err.name === 'AbortError') {
                nanoBubble.textContent += ' [Stopped]';
            } else {
                nanoBubble.textContent = "Error: " + err.message;
            }
        } finally {
            nanoBubble.classList.remove('streaming');
            setUI(false);
            abortController = null;
        }
    }

    function addBubble(text, cls) {
        const div = document.createElement('div');
        div.className = `msg ${cls}`;
        div.textContent = text;
        chatFlow.appendChild(div);
        chatFlow.scrollTop = chatFlow.scrollHeight;
        return div;
    }

    sendBtn.onclick = chat;
    promptInput.onkeydown = (e) => { if (e.key === 'Enter') chat(); };
</script>
</body>
</html>
